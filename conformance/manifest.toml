# conformance/manifest.toml -- references to golden capture traces.
#
# Golden captures are NOT committed (they are MBs and some carry model token
# content). They live in our private bucket; this manifest pins each one by
# sha256 so CI can fetch and verify it. Parsed by `sim-compat::GoldenManifest`.
#
# One [[golden]] entry per captured trace:
#   line         vLLM line it validates (matches a compat.toml [[vllm]].line)
#   bucket_path  key within the bucket (CI fetches ${CONFORMANCE_BUCKET}/${bucket_path});
#                live under the conformance/ prefix the fetch role is scoped to.
#                Convention: conformance/<line>/<gpu>/<model>/<workload>[-seed<N>].jsonl.gz
#                -- gpu and model id (its '/' kept) are path segments so one line's
#                captures across hardware/models don't collide. These mirror config_hash
#                inputs; the hash stays the authoritative replay key, the path is just
#                organization. CI mirrors the full key under $CONFORMANCE_GOLDENS, so the
#                path (not just the basename) is resolved.
#   sha256       content hash; CI fetches + verifies against this
#   config_hash  deployment-config fingerprint; replay gate uses it as
#                --expect-config-hash so a trace can't replay against the wrong config
#   workload     label, e.g. "sweep" or "multiturn"
#   role         "schema" (cheap structural/handshake conformance) or
#                "fidelity" (tolerance-banded behavioral replay)
#
# Bucket is s3://llm-d-artifacts-783952637884 (CONFORMANCE_BUCKET in ci.yml); the
# fetch role (llm-d-conformance-ci) can GetObject under conformance/ only.
#
# Example (uncomment and fill once the first capture is uploaded):
#
# [[golden]]
# line = "0.23"
# bucket_path = "conformance/0.23/H200/Qwen/Qwen3-8B/sweep.jsonl.gz"
# sha256 = "TODO"
# config_hash = "TODO"
# workload = "sweep"
# role = "fidelity"
